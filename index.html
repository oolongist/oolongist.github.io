<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>乌龙茶 · Personal Space</title>
    <meta
      name="description"
      content="审美驱动型开发者的小空间。"
    />
    <style>
      :root {
        --bg: #f5f4f1;
        --paper: #ffffff;
        --text: #1f1f1f;
        --muted: #6a6864;
        --line: #ddd9d2;
        --accent: #3e5a47;
        --shadow: 0 12px 30px rgba(31, 31, 31, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at 8% 6%, #e8e4dc 0, transparent 32%),
          radial-gradient(circle at 92% 4%, #ebe9e3 0, transparent 28%),
          var(--bg);
        color: var(--text);
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
        line-height: 1.65;
        padding: 40px 20px;
      }

      .shell {
        max-width: 920px;
        margin: 0 auto;
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        border-radius: 16px;
        overflow: hidden;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        font-size: 0.95rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .clock {
        font-size: 0.9rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      main {
        padding: 42px 24px 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3.4vw, 2.8rem);
        line-height: 1.28;
        font-weight: 580;
      }

      .intro {
        margin: 18px 0 0;
        color: var(--muted);
        max-width: 60ch;
      }

      .grid {
        margin-top: 34px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        background: #faf9f6;
      }

      .panel h2 {
        font-size: 0.95rem;
        margin: 0 0 10px;
        font-weight: 560;
        letter-spacing: 0.03em;
      }

      .visual {
        min-height: 180px;
        border-radius: 10px;
        border: 1px dashed #c9c3b8;
        display: grid;
        place-items: center;
        color: #77726a;
        font-size: 0.92rem;
        background:
          linear-gradient(140deg, #ece8df, #f8f6f1 55%, #ede9df),
          repeating-linear-gradient(
            45deg,
            rgba(100, 94, 86, 0.04),
            rgba(100, 94, 86, 0.04) 8px,
            transparent 8px,
            transparent 16px
          );
      }

      .quote {
        margin: 0;
        color: #2a2a2a;
      }

      .quote strong {
        color: var(--accent);
        font-weight: 560;
      }

      .notes {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
        color: #444;
      }

      .notes li {
        display: flex;
        gap: 8px;
      }

      .notes li::before {
        content: "·";
        color: #9a958a;
      }

      footer {
        padding: 14px 24px 22px;
        border-top: 1px solid var(--line);
        font-size: 0.88rem;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }

      a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid #bcb6aa;
      }

      a:hover {
        color: #111;
      }

      @media (max-width: 760px) {
        body {
          padding: 22px 12px;
        }

        .top,
        main,
        footer {
          padding-left: 16px;
          padding-right: 16px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <div class="brand">Personal Space</div>
        <div class="clock" id="clock" aria-live="polite"></div>
      </header>

      <main>
        <h1>
          三得利无糖乌龙茶。<br />
          人们叫我乌龙茶。
        </h1>
        <p class="intro">
          住老小区单间，一盆薄荷（半死不活）。审美驱动，对丑的东西没有耐心。喜欢夜间散步，无目的漫游。
        </p>

        <section class="grid" aria-label="内容区域">
          <article class="panel">
            <h2>Photos</h2>
            <div class="visual">在这里放一张你喜欢的照片</div>
          </article>

          <article class="panel">
            <h2>Visual</h2>
            <div class="visual">在这里放插画、海报或任何视觉片段</div>
          </article>

          <article class="panel">
            <h2>Now</h2>
            <p class="quote">
              正在做的事：<strong>给自己做个人站、整理代码、偶尔摆盘拍照</strong>
            </p>
          </article>

          <article class="panel">
            <h2>Notes</h2>
            <ul class="notes">
              <li>海苔、苏打饼干、蛋黄酥</li>
              <li>无糖乌龙茶、冰美式</li>
              <li>夜间散步，看老小区的灯</li>
            </ul>
          </article>
        </section>
      </main>

      <footer>
        <span>© <span id="year"></span> 乌龙茶</span>
        <span>
          <a href="https://github.com" target="_blank" rel="noreferrer">GitHub</a>
        </span>
      </footer>
    </div>

    <script>
      const clockEl = document.getElementById("clock");
      const yearEl = document.getElementById("year");

      function updateClock() {
        const now = new Date();
        const text = now.toLocaleString("zh-CN", {
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
        clockEl.textContent = text;
      }

      updateClock();
      setInterval(updateClock, 30_000);
      yearEl.textContent = new Date().getFullYear();
    </script>
  </body>
</html>
